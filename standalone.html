<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sales Commission Calculator</title>
    <!--
      Standalone, self-contained version of the Sales Commission Calculator.
      No build step or install required: open this file in any browser, or host it
      (e.g. GitHub Pages) for sales people to use directly.

      The commission rules below mirror src/commissionRules.ts. Any change to
      thresholds, rates or the payment split must be made in BOTH places via a
      pull request approved by the relevant business owner and Finance.
    -->
    <style>
      :root {
        font-family: Arial, Helvetica, sans-serif;
        color: #1f2937;
        background: #f3f4f6;
      }
      body { margin: 0; }
      .page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
        box-sizing: border-box;
      }
      .card {
        width: min(1060px, 100%);
        background: white;
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
        box-sizing: border-box;
      }
      .header {
        border-bottom: 1px solid #e5e7eb;
        margin-bottom: 24px;
        padding-bottom: 16px;
      }
      .eyebrow {
        text-transform: uppercase;
        font-size: 12px;
        letter-spacing: 0.08em;
        font-weight: 700;
        color: #4b5563;
        margin: 0 0 8px;
      }
      h1, h2 { margin: 0 0 8px; }
      .header p { margin: 0; }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1.1fr;
        gap: 24px;
      }
      .inputs { display: grid; gap: 16px; align-content: start; }
      label { display: grid; gap: 6px; font-weight: 700; }
      input, select {
        font: inherit;
        padding: 12px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
      }
      .results {
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 20px;
        background: #f9fafb;
      }
      dl { display: grid; gap: 12px; margin: 16px 0; }
      dl div {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        border-bottom: 1px solid #e5e7eb;
        padding-bottom: 10px;
      }
      dt { font-weight: 700; }
      dd { margin: 0; text-align: right; }
      .warnings {
        margin-top: 16px;
        padding: 12px;
        border-radius: 8px;
        background: #fff7ed;
        border: 1px solid #fed7aa;
      }
      .warnings p { margin: 0 0 8px; }
      .warnings p:last-child { margin-bottom: 0; }
      @media (max-width: 760px) {
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <div class="header">
          <p class="eyebrow">Internal tool - draft</p>
          <h1>Sales Commission Calculator</h1>
          <p>
            Estimate indicative commission based on contract value, approved gross
            margin and sales credit.
          </p>
        </div>

        <div class="grid">
          <form class="inputs" id="inputs">
            <label>
              Contract value (£)
              <input id="contractValue" type="number" min="0" step="1000" value="15000000" />
            </label>

            <label>
              Approved gross margin (%)
              <input id="grossMarginPercent" type="number" min="0" step="0.1" value="13" />
            </label>

            <label>
              Sales credit (%)
              <input id="salesCreditPercent" type="number" min="0" max="100" step="1" value="100" />
            </label>

            <label>
              Approval status
              <select id="approvalStatus">
                <option value="approved">Approved</option>
                <option value="not_approved">Not approved</option>
              </select>
            </label>

            <label>
              Conditions precedent
              <select id="conditionsStatus">
                <option value="cleared">Cleared</option>
                <option value="not_cleared">Not cleared</option>
              </select>
            </label>
          </form>

          <section class="results" aria-live="polite">
            <h2>Indicative result</h2>
            <dl>
              <div><dt>Gross profit</dt><dd id="grossProfit">—</dd></div>
              <div><dt>Commission band</dt><dd id="commissionBand">—</dd></div>
              <div><dt>Total commission</dt><dd id="totalCommission">—</dd></div>
              <div><dt>50% signature payment</dt><dd id="signaturePayment">—</dd></div>
              <div><dt>50% deferred payment</dt><dd id="deferredPayment">—</dd></div>
              <div><dt>Payable at signature?</dt><dd id="payableAtSignature">—</dd></div>
            </dl>
            <div class="warnings" id="warnings"></div>
          </section>
        </div>
      </section>
    </main>

    <script>
      // --- Commission rules (mirror of src/commissionRules.ts) ---
      var COMMISSION_BANDS = [
        { label: 'Below 13% GM - no commission', minMarginPercent: 0, maxMarginPercent: 12.999999, rateOfGrossProfit: 0 },
        { label: '13% to 14.99% GM - base', minMarginPercent: 13, maxMarginPercent: 14.999999, rateOfGrossProfit: 0.0198 },
        { label: '15% to 17.99% GM - stretch', minMarginPercent: 15, maxMarginPercent: 17.999999, rateOfGrossProfit: 0.0245 },
        { label: '18%+ GM - high stretch', minMarginPercent: 18, maxMarginPercent: null, rateOfGrossProfit: 0.0315 },
      ];
      var SIGNATURE_PAYMENT_PERCENTAGE = 0.5;
      var DEFERRED_PAYMENT_PERCENTAGE = 0.5;

      function findCommissionBand(grossMarginPercent) {
        return COMMISSION_BANDS.find(function (band) {
          var aboveMinimum = grossMarginPercent >= band.minMarginPercent;
          var belowMaximum = band.maxMarginPercent === null || grossMarginPercent <= band.maxMarginPercent;
          return aboveMinimum && belowMaximum;
        });
      }

      function calculateCommission(input) {
        var band = findCommissionBand(input.grossMarginPercent);
        var grossProfit = input.contractValue * (input.grossMarginPercent / 100);
        var totalIndicativeCommission =
          grossProfit * band.rateOfGrossProfit * (input.salesCreditPercent / 100);
        var signaturePayment = totalIndicativeCommission * SIGNATURE_PAYMENT_PERCENTAGE;
        var deferredPayment = totalIndicativeCommission * DEFERRED_PAYMENT_PERCENTAGE;

        var warnings = [];
        if (input.grossMarginPercent < 13) {
          warnings.push('No commission is payable below 13% gross margin.');
        }
        if (input.approvalStatus !== 'approved') {
          warnings.push('Indicative only - not payable until the deal has full internal approval.');
        }
        if (input.conditionsStatus !== 'cleared') {
          warnings.push('Indicative only - not payable at signature until all conditions precedent are cleared.');
        }
        warnings.push(
          'Indicative only - final commission is subject to Finance validation, approval gates, final margin reconciliation and the formal policy.'
        );

        return {
          grossProfit: grossProfit,
          commissionBand: band,
          totalIndicativeCommission: totalIndicativeCommission,
          signaturePayment: signaturePayment,
          deferredPayment: deferredPayment,
          payableAtSignature:
            totalIndicativeCommission > 0 &&
            input.approvalStatus === 'approved' &&
            input.conditionsStatus === 'cleared',
          warnings: warnings,
        };
      }

      var gbp = new Intl.NumberFormat('en-GB', {
        style: 'currency',
        currency: 'GBP',
        maximumFractionDigits: 0,
      });
      function formatGBP(value) { return gbp.format(value); }

      // --- Wiring ---
      function num(id) {
        var v = Number(document.getElementById(id).value);
        return Number.isFinite(v) ? v : 0;
      }
      function val(id) { return document.getElementById(id).value; }

      function render() {
        var contractValue = Math.max(0, num('contractValue'));
        var grossMarginPercent = Math.max(0, num('grossMarginPercent'));
        var salesCreditPercent = Math.min(100, Math.max(0, num('salesCreditPercent')));

        var result = calculateCommission({
          contractValue: contractValue,
          grossMarginPercent: grossMarginPercent,
          salesCreditPercent: salesCreditPercent,
          approvalStatus: val('approvalStatus'),
          conditionsStatus: val('conditionsStatus'),
        });

        document.getElementById('grossProfit').textContent = formatGBP(result.grossProfit);
        document.getElementById('commissionBand').textContent = result.commissionBand.label;
        document.getElementById('totalCommission').textContent = formatGBP(result.totalIndicativeCommission);
        document.getElementById('signaturePayment').textContent = formatGBP(result.signaturePayment);
        document.getElementById('deferredPayment').textContent = formatGBP(result.deferredPayment);
        document.getElementById('payableAtSignature').textContent =
          result.payableAtSignature ? 'Yes - subject to policy' : 'No / not yet';

        var warnings = document.getElementById('warnings');
        warnings.innerHTML = '';
        result.warnings.forEach(function (w) {
          var p = document.createElement('p');
          p.textContent = w;
          warnings.appendChild(p);
        });
      }

      document.getElementById('inputs').addEventListener('input', render);
      document.getElementById('inputs').addEventListener('change', render);
      render();
    </script>
  </body>
</html>
